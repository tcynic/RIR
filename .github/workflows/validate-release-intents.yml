name: Validate Release Intents

on:
  pull_request:
    paths:
      - 'docs/release-intents/**'
      - '.github/scripts/validate_release_intents.py'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate release intents
        run: python .github/scripts/validate_release_intents.py
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
